<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simulador Financeiro</title>
  </head>
  <body>
    <h1>Produção</h1>
    Digite área (m²): <input type="text" id="ipt_area_m2" /><br />
    Digite a densidade (m²): <input type="text" id="ipt_densidade" /><br />
    Digite a quantidade descartada:
    <input type="text" id="ipt_descarte" /><br />
    Digite quantidade de dias do ciclo:
    <input type="text" id="ipt_dias" /><br />

    <h1>Financeiro</h1>
    <h3>Receita</h3>
    Digite o preco unitário: <input type="text" id="ipt_preco" /><br />
    <h3>Despesa</h3>
    Digite o custo variável: <input type="text" id="ipt_variavel" /><br />
    Digite o custo fixo mensal:
    <input type="text" id="ipt_fixo_mensal" /><br /><br />

    <button onclick="calcular()"><b>Calcular</b></button>

    <div id="div_mensagem"></div>
  </body>
  <script>
    function calcular() {
      //CALCULOS SEM O PROJETO

      div_mensagem.innerHTML = `<h1>Preços sem o projeto</br>`;

      //Receita
      let area_m2 = Number(ipt_area_m2.value);
      let densidade = Number(ipt_densidade.value);
      let descarte = Number(ipt_descarte.value);
      let preco_venda = Number(ipt_preco.value);

      let unidades_produzidas = area_m2 * densidade;

      let unidades_colhidas = unidades_produzidas - descarte;

      let porcentagem_descarte = 100 - (unidades_colhidas * 100) / unidades_produzidas;

      let receita = unidades_colhidas * preco_venda;

      //Custos

      let variavel = Number(ipt_variavel.value);
      let fixo_mensal = Number(ipt_fixo_mensal.value);
      let dias = Number(ipt_dias.value);

      dias /= 30;

      let custo_fixo_rateado_ciclo = fixo_mensal * dias;

      let custo_total = variavel + custo_fixo_rateado_ciclo;

      //Resultado

      let lucro = receita - custo_total;

      let custo_unidade = custo_total / unidades_colhidas;

      let lucro_unidade = preco_venda - custo_unidade;

      //Lucro minimo

      let preco_min = (custo_total / unidades_colhidas) * 1.3;

      div_mensagem.innerHTML += `
      Porcentagem de descarte: <b>${porcentagem_descarte.toFixed(2)}%</b><br>`;

      if (lucro > 0) {
        div_mensagem.innerHTML += `Lucro: <span style="color: green;"><b>R$${lucro.toFixed(2)}</b></span><br>`;
      } else {
        if (lucro < 0) {
          div_mensagem.innerHTML += `Lucro: <span style="color: red;"><b>R$${lucro.toFixed(2)}</b></span><br>`;
        } else {
          div_mensagem.innerHTML += `Lucro: <b>R$${lucro.toFixed(2)}</b><br>`;
        }
      }

      div_mensagem.innerHTML += `
      Custo por unidade: <b>R$${custo_unidade.toFixed(2)}</b><br>
      Lucro por unidade: <b>R$${lucro_unidade.toFixed(2)}</b><br><br>
      Preço para gerar lucro: <b>R$${preco_min.toFixed(2)}</b><br><br>`;

      ///////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////

      //CALCULOS COM O PROJETO

      div_mensagem.innerHTML += `<h1>Preços com o projeto</h1><br>`;

      //Receita
      let descarte_projeto = descarte * 0.75;

      let unidades_colhidas_projeto = unidades_produzidas - descarte_projeto;

      let porcentagem_descarte_projeto =
        100 - (unidades_colhidas_projeto * 100) / unidades_produzidas;

      let receita_projeto = unidades_colhidas_projeto * preco_venda;

      //Resultado
      let lucro_projeto = receita_projeto - custo_total;

      let custo_unidade_projeto = custo_total / unidades_colhidas_projeto;

      let lucro_unidade_projeto = preco_venda - custo_unidade_projeto;

      let diferenca_lucro = lucro_projeto - lucro;

      let diferenca_lucro_porcento = (diferenca_lucro * 100) / lucro_projeto;

      //Lucro minimo
      let preco_min_projeto = (custo_total / unidades_colhidas_projeto) * 1.3;

      div_mensagem.innerHTML += `
      Porcentagem de descarte: <b>${porcentagem_descarte_projeto.toFixed(0)}%</b><br>`;

      if (lucro > 0) {
        div_mensagem.innerHTML += `Lucro: <span style="color: green;"><b>R$${lucro_projeto.toFixed(2)}</b></span>. Diferença de <b>R$${diferenca_lucro.toFixed(2)}</b>(<b>${diferenca_lucro_porcento.toFixed(0)}%</b>)<br>`;
      } else {
        if (lucro < 0) {
          div_mensagem.innerHTML += `Lucro: <span style="color: red;"><b>R$${lucro_projeto.toFixed(2)}</b></span>. Diferença de R$${diferenca_lucro.toFixed(2)}(${diferenca_lucro_porcento.toFixed(0)}%)<br>`;
        } else {
          div_mensagem.innerHTML += `Lucro: <b>R$${lucro_projeto.toFixed(2)}</b>. Diferença de R$${diferenca_lucro.toFixed(2)}(${diferenca_lucro_porcento.toFixed(0)}%)<br>`;
        }
      }

      div_mensagem.innerHTML += `
      Custo por unidade: <b>R$${custo_unidade_projeto.toFixed(2)}</b><br>
      Lucro por unidade: <b>R$${lucro_unidade_projeto.toFixed(2)}</b><br><br>
      Preço para gerar lucro: <b>R$${preco_min_projeto.toFixed(2)}</b><br><br>`;
    }

    /* Rateada significa dividir um custo entre partes proporcionalmente. 
      Exemplo: Custo fixo mensal = 1600, mas ciclo do alface é 45 dias 
      Calculo: custo_rateado = custo_mensal * (dias_ciclo / 30)
      custo_rateado = 1600 * (45 / 30)
      custo_rateado = 1600 × 1,5
      custo_rateado = 2400 
      Isso significa que, durante 45 dias de produção, o negócio utilizou R$ 2.400 dos custos fixos, mesmo que esses custos sejam registrados mensalmente.*/
  </script>
</html>
